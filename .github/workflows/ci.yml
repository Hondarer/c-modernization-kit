name: CI (Build, Test, and Docs)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os-name: ol8
            image: ghcr.io/hondarer/oracle-linux-container/oracle-linux-8-dev:latest
          - os-name: ol10
            image: ghcr.io/hondarer/oracle-linux-container/oracle-linux-10-dev:latest
    container:
      image: ${{ matrix.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        HOST_USER: user
        HOST_UID: 1001
        HOST_GID: 127
        TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Record make version
        run: make --version

      - name: Make build log directory
        run: mkdir -p logs

      - name: Build
        run: |
          set -o pipefail
          make 2>&1 | tee logs/linux-${{ matrix.os-name }}-build.log

      - name: Set PATH and library path for tests
        run: |
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/app/calc/prod/lib:$GITHUB_WORKSPACE/app/calc.net/prod/lib:$GITHUB_WORKSPACE/app/override-sample/prod/lib:$GITHUB_WORKSPACE/app/porter/prod/lib:$GITHUB_WORKSPACE/app/com_util/prod/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/app/calc/prod/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/app/calc.net/prod/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/app/override-sample/prod/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/app/porter/prod/bin" >> $GITHUB_PATH

      - name: Run tests
        run: |
          set -o pipefail
          make test 2>&1 | tee logs/linux-${{ matrix.os-name }}-test.log

      - name: Upload test results artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.os-name }}-test-results
          path: |
            app/**/results/
            logs/linux-${{ matrix.os-name }}-test.log
          if-no-files-found: warn

      - name: Upload build warnings
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.os-name }}-warns
          path: |
            app/c_cpp_properties.warn
            app/**/prod/**/*.warn
            app/**/test/**/*.warn
          if-no-files-found: ignore

      - name: Upload build logs
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.os-name }}-logs
          path: logs/linux-${{ matrix.os-name }}-build.log
          if-no-files-found: warn

  build-and-test-windows:
    runs-on: windows-2025
    env:
      TZ: JST-9

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install OpenCppCoverage
        run: |
          $maxRetry = 3
          $retryCount = 0
          $installed = $false
          while (-not $installed -and $retryCount -lt $maxRetry) {
              $retryCount++
              Write-Host "choco install opencppcoverage (attempt $retryCount/$maxRetry)..."
              choco install opencppcoverage -y
              if ($LASTEXITCODE -eq 0) {
                  $installed = $true
              } elseif ($retryCount -lt $maxRetry) {
                  Write-Host "Installation failed (exit code $LASTEXITCODE). Retrying in 10 seconds..."
                  Start-Sleep -Seconds 10
              }
          }
          if (-not $installed) {
              Write-Host "ERROR: choco install opencppcoverage failed after $maxRetry attempts."
              exit 1
          }

          # PATH に追加 (GitHub Actions の永続化メカニズムを使用)
          $opencppPath = "C:\Program Files\OpenCppCoverage"
          if (Test-Path $opencppPath) {
              Write-Host "`nAdding OpenCppCoverage to PATH..."
              Add-Content -Path $env:GITHUB_PATH -Value $opencppPath
              Write-Host "PATH addition completed."
          } else {
              Write-Host "ERROR: OpenCppCoverage installation directory not found at $opencppPath"
              exit 1
          }
        shell: pwsh

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool
        shell: pwsh

      - name: Setup MSVC environment
        run: |
          & "${{ github.workspace }}\.github\scripts\Add-VSBT-Env-x64.ps1"
        shell: pwsh

      - name: Record make version
        run: make --version
        shell: pwsh

      - name: Make build log directory
        run: New-Item -ItemType Directory -Force -Path logs
        shell: pwsh

      - name: Build
        run: |
          set -o pipefail
          make 2>&1 | tee logs/windows-build.log
        shell: bash

      - name: Set PATH for tests
        run: |
          $paths = @(
            "${{ github.workspace }}\app\calc\prod\lib",
            "${{ github.workspace }}\app\calc\prod\bin",
            "${{ github.workspace }}\app\calc.net\prod\lib",
            "${{ github.workspace }}\app\calc.net\prod\bin",
            "${{ github.workspace }}\app\override-sample\prod\lib",
            "${{ github.workspace }}\app\override-sample\prod\bin",
            "${{ github.workspace }}\app\porter\prod\lib",
            "${{ github.workspace }}\app\porter\prod\bin",
            "${{ github.workspace }}\app\com_util\prod\lib"
          )
          foreach ($p in $paths) {
            Add-Content -Path $env:GITHUB_PATH -Value $p
            Write-Host "Added $p to PATH"
          }
        shell: pwsh

      - name: Run tests
        run: |
          set -o pipefail
          make test 2>&1 | tee logs/windows-test.log
        shell: bash

      - name: Upload test results artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-test-results
          path: |
            app/**/results/
            logs/windows-test.log
          if-no-files-found: warn

      - name: Upload build warnings
        uses: actions/upload-artifact@v7
        with:
          name: windows-warns
          path: |
            app/c_cpp_properties.warn
            app/**/prod/**/*.warn
            app/**/test/**/*.warn
          if-no-files-found: ignore

      - name: Upload build logs
        uses: actions/upload-artifact@v7
        with:
          name: windows-logs
          path: logs/windows-build.log
          if-no-files-found: warn

  publish-docs:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/hondarer/oracle-linux-container/oracle-linux-8-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        HOST_USER: user
        HOST_UID: 1001
        HOST_GID: 127
        TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 全履歴を取得 (git log 用: Markdown 処理時に author と date を取得するため)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Initialize submodules (shallow)
        run: git submodule update --init --recursive --depth 1

      - name: Sync skills
        run: make skills

      - name: Generate and publish documentation
        run: make doxy && make docs

      - name: Create artifact archives
        run: |
          mkdir -p pages/artifacts
          # HTML ドキュメント (サブディレクトリごとに分割)
          if [ -d "pages/doxygen" ]; then
            zip -r pages/artifacts/docs-html-doxygen.zip pages/doxygen || true
          fi
          docs_warn_list=$(mktemp)
          {
            [ -f docs.warn ] && printf '%s\n' docs.warn
            find app -type f -name "doxy.warn" | sort
          } > "$docs_warn_list"
          if [ -s "$docs_warn_list" ]; then
            zip -r pages/artifacts/docs-warns.zip -@ < "$docs_warn_list" || true
          fi
          rm -f "$docs_warn_list"
          find pages -type d -name html | while read -r html_dir; do
            label=$(echo "$html_dir" | sed 's|^pages/||;s|/html$||;s|/|-|g')
            zip -r "pages/artifacts/docs-html-${label}.zip" "$html_dir" || true
          done
          # DOCX ドキュメント (サブディレクトリごとに分割)
          find pages -type d -name docx | while read -r docx_dir; do
            label=$(echo "$docx_dir" | sed 's|^pages/||;s|/docx$||;s|/|-|g')
            zip -r "pages/artifacts/docs-docx-${label}.zip" "$docx_dir" || true
          done

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: pages/
          if-no-files-found: warn

      - name: Upload documentation warnings
        uses: actions/upload-artifact@v7
        with:
          name: docs-warns
          path: |
            docs.warn
            app/**/doxy.warn
          if-no-files-found: ignore

      - name: Upload html artifacts (doxygen)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-html-doxygen-${{ github.sha }}
          path: pages/doxygen/
          if-no-files-found: warn

      - name: Upload html artifacts (ja)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-html-ja-${{ github.sha }}
          path: pages/ja/html/
          if-no-files-found: warn

      - name: Upload html artifacts (en)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-html-en-${{ github.sha }}
          path: pages/en/html/
          if-no-files-found: warn

      - name: Upload html artifacts (ja-details)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-html-ja-details-${{ github.sha }}
          path: pages/ja-details/html/
          if-no-files-found: warn

      - name: Upload html artifacts (en-details)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-html-en-details-${{ github.sha }}
          path: pages/en-details/html/
          if-no-files-found: warn

      - name: Upload docx artifacts (ja)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-docx-ja-${{ github.sha }}
          path: pages/ja/docx/
          if-no-files-found: warn

      - name: Upload docx artifacts (en)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-docx-en-${{ github.sha }}
          path: pages/en/docx/
          if-no-files-found: warn

      - name: Upload docx artifacts (ja-details)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-docx-ja-details-${{ github.sha }}
          path: pages/ja-details/docx/
          if-no-files-found: warn

      - name: Upload docx artifacts (en-details)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-docx-en-details-${{ github.sha }}
          path: pages/en-details/docx/
          if-no-files-found: warn

  warnings-summary:
    runs-on: ubuntu-latest
    needs: [build-and-test-linux, build-and-test-windows, publish-docs]
    if: ${{ always() }}

    steps:
      - name: Summarize warning artifacts
        uses: actions/github-script@v9
        with:
          script: |
            const trackedArtifacts = [
              'linux-ol8-warns',
              'linux-ol10-warns',
              'windows-warns',
              'docs-warns',
            ];

            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              }
            );

            const artifactNames = new Set(artifacts.map((artifact) => artifact.name));
            const detectedNames = trackedArtifacts.filter((artifactName) => artifactNames.has(artifactName));

            core.info(`Artifacts in run: ${Array.from(artifactNames).sort().join(', ')}`);

            if (detectedNames.length > 0) {
              core.warning(`Warning artifacts detected: ${detectedNames.join(', ')}`);

              const list = detectedNames
                .map((artifactName) => `- \`${artifactName}\``)
                .join('\n');

              await core.summary
                .addHeading('Warning artifacts detected', 2)
                .addRaw('The workflow completed and warning artifacts were uploaded.\n\n')
                .addRaw(`${list}\n\n`)
                .addRaw('Review the Artifacts section of this run for details.\n')
                .write();
            } else {
              await core.summary
                .addHeading('Warning artifacts', 2)
                .addRaw('No warning artifacts were uploaded in this run.\n')
                .write();
            }

  deploy-pages:
    needs: [build-and-test-linux, build-and-test-windows, publish-docs]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Linux OL8 test results
        uses: actions/download-artifact@v8
        with:
          name: linux-ol8-test-results
          path: test-results/linux-ol8

      - name: Download Linux OL10 test results
        uses: actions/download-artifact@v8
        with:
          name: linux-ol10-test-results
          path: test-results/linux-ol10

      - name: Download Windows test results
        uses: actions/download-artifact@v8
        with:
          name: windows-test-results
          path: test-results/windows

      - name: Download documentation
        uses: actions/download-artifact@v8
        with:
          name: documentation
          path: pages

      - name: Download Linux OL8 logs
        uses: actions/download-artifact@v8
        with:
          name: linux-ol8-logs
          path: logs/linux-ol8

      - name: Download Linux OL10 logs
        uses: actions/download-artifact@v8
        with:
          name: linux-ol10-logs
          path: logs/linux-ol10

      - name: Download Windows logs
        uses: actions/download-artifact@v8
        with:
          name: windows-logs
          path: logs/windows

      - name: Detect optional build warning artifacts
        id: warning_artifacts
        uses: actions/github-script@v9
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              }
            );
            const artifactNames = new Set(artifacts.map((artifact) => artifact.name));
            core.info(`Artifacts in run: ${Array.from(artifactNames).sort().join(', ')}`);
            core.setOutput('linux_ol8', String(artifactNames.has('linux-ol8-warns')));
            core.setOutput('linux_ol10', String(artifactNames.has('linux-ol10-warns')));
            core.setOutput('windows', String(artifactNames.has('windows-warns')));

      - name: Download Linux OL8 build warnings
        if: steps.warning_artifacts.outputs.linux_ol8 == 'true'
        uses: actions/download-artifact@v8
        with:
          name: linux-ol8-warns
          path: warns/linux-ol8

      - name: Download Linux OL10 build warnings
        if: steps.warning_artifacts.outputs.linux_ol10 == 'true'
        uses: actions/download-artifact@v8
        with:
          name: linux-ol10-warns
          path: warns/linux-ol10

      - name: Download Windows build warnings
        if: steps.warning_artifacts.outputs.windows == 'true'
        uses: actions/download-artifact@v8
        with:
          name: windows-warns
          path: warns/windows

      - name: Organize artifacts for Pages
        run: |
          # テスト結果とビルドログをアーカイブ化
          mkdir -p pages/artifacts

          if [ -d "test-results/linux-ol8" ]; then
            zip -r pages/artifacts/linux-ol8-test-results.zip test-results/linux-ol8
            echo "Created linux-ol8-test-results.zip"
          fi

          if [ -d "test-results/linux-ol10" ]; then
            zip -r pages/artifacts/linux-ol10-test-results.zip test-results/linux-ol10
            echo "Created linux-ol10-test-results.zip"
          fi

          if [ -d "test-results/windows" ]; then
            zip -r pages/artifacts/windows-test-results.zip test-results/windows
            echo "Created windows-test-results.zip"
          fi

          if [ -d "logs/linux-ol8" ]; then
            zip -r pages/artifacts/linux-ol8-logs.zip logs/linux-ol8
            echo "Created linux-ol8-logs.zip"
          fi

          if [ -d "logs/linux-ol10" ]; then
            zip -r pages/artifacts/linux-ol10-logs.zip logs/linux-ol10
            echo "Created linux-ol10-logs.zip"
          fi

          if [ -d "logs/windows" ]; then
            zip -r pages/artifacts/windows-logs.zip logs/windows
            echo "Created windows-logs.zip"
          fi

          # ビルド警告を ZIP 化して pages/artifacts/ に配置し、元ディレクトリを削除
          for os in linux-ol8 linux-ol10 windows; do
            if [ -d "warns/${os}" ]; then
              zip -r "pages/artifacts/${os}-warns.zip" "warns/${os}"
              rm -rf "warns/${os}"
              echo "Created ${os}-warns.zip"
            fi
          done

          # ディレクトリ構造を確認
          echo "=== Pages directory structure ==="
          find pages -type f | head -20
          echo "..."

      - name: Create Pages root index.html
        run: |
          {
            cat <<'INDEX_TOP'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>c-modernization-kit ドキュメント</title>
            <style>
              body { font-family: sans-serif; max-width: 900px; margin: 2em auto; padding: 0 1em; }
              h1 { border-bottom: 2px solid #333; padding-bottom: 0.3em; }
              h2 { border-bottom: 1px solid #ccc; margin-top: 1.5em; }
              table { border-collapse: collapse; width: 100%; }
              th, td { text-align: left; padding: 0.4em 0.8em; border: 1px solid #ddd; }
              th { background: #f6f8fa; }
              a { color: #0366d6; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>c-modernization-kit ドキュメント</h1>
          INDEX_TOP

            # Doxygen サブフォルダを自動探索してリンク生成
            if [ -d "./pages/doxygen" ] && \
               find ./pages/doxygen -maxdepth 1 -mindepth 1 -type d | grep -q .; then
              echo '  <h2>Doxygen ドキュメント</h2>'
              echo '  <table>'
              echo '    <tr><th>モジュール</th><th>リンク</th></tr>'
              find ./pages/doxygen -maxdepth 1 -mindepth 1 -type d | sort | while read -r subdir; do
                name=$(basename "$subdir")
                echo "    <tr><td>${name}</td><td><a href=\"doxygen/${name}/index.html\">${name} リファレンス</a></td></tr>"
              done
              echo '  </table>'
            fi

            # Markdown ドキュメント
            if find ./pages -maxdepth 2 -name html -type d | grep -q .; then
              cat <<'LANG_TABLE'
            <h2>Markdown ドキュメント</h2>
            <table>
              <tr><th>言語</th><th>種別</th><th>リンク</th></tr>
              <tr><td>日本語</td><td>通常版</td><td><a href="ja/html/index.html">日本語ドキュメント</a></td></tr>
              <tr><td>English</td><td>Standard</td><td><a href="en/html/index.html">English Documentation</a></td></tr>
              <tr><td>日本語</td><td>詳細版</td><td><a href="ja-details/html/index.html">日本語ドキュメント (詳細)</a></td></tr>
              <tr><td>English</td><td>Details</td><td><a href="en-details/html/index.html">English Documentation (Details)</a></td></tr>
            </table>
          LANG_TABLE
            fi

            # アーティファクト (存在するものを列挙)
            if [ -d "./pages/artifacts" ] && \
               find ./pages/artifacts -name "*.zip" ! -name "*-warns.zip" | grep -q .; then
              echo '  <h2>アーティファクト</h2>'
              echo '  <table>'
              echo '    <tr><th>ファイル名</th></tr>'
              find ./pages/artifacts -name "*.zip" ! -name "*-warns.zip" | sort | while read -r zipfile; do
                fname=$(basename "$zipfile")
                echo "    <tr><td><a href=\"artifacts/${fname}\">${fname}</a></td></tr>"
              done
              echo '  </table>'
            fi

            # ビルド・ドキュメント警告詳細 (存在する場合のみ列挙)
            if [ -d "./pages/artifacts" ] && \
               find ./pages/artifacts -name "*-warns.zip" | grep -q .; then
              echo '  <h2>ビルド・ドキュメント警告詳細</h2>'
              echo '  <table>'
              echo '    <tr><th>ファイル名</th></tr>'
              find ./pages/artifacts -name "*-warns.zip" | sort | while read -r zipfile; do
                fname=$(basename "$zipfile")
                echo "    <tr><td><a href=\"artifacts/${fname}\">${fname}</a></td></tr>"
              done
              echo '  </table>'
            fi

            cat <<'INDEX_BOTTOM'
          </body>
          </html>
          INDEX_BOTTOM
          } > ./pages/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
