name: CI (Build, Test, and Docs)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os-name: ol8
            image: ghcr.io/hondarer/oracle-linux-container/oracle-linux-8-dev:latest
          - os-name: ol10
            image: ghcr.io/hondarer/oracle-linux-container/oracle-linux-10-dev:latest
    container:
      image: ${{ matrix.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        HOST_USER: user
        HOST_UID: 1001
        HOST_GID: 127

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Record make version
        run: make --version

      - name: Make build log directory
        run: mkdir -p logs

      - name: Build
        run: |
          set -o pipefail
          make 2>&1 | tee logs/linux-${{ matrix.os-name }}-build.log

      - name: Set PATH and library path for tests
        run: |
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/prod/calc/lib:$GITHUB_WORKSPACE/prod/calc.net/lib:$GITHUB_WORKSPACE/prod/override-sample/lib:$GITHUB_WORKSPACE/prod/porter/lib:$GITHUB_WORKSPACE/prod/util/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/prod/calc/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/prod/calc.net/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/prod/override-sample/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/prod/porter/bin" >> $GITHUB_PATH

      - name: Run tests
        run: |
          set -o pipefail
          make test 2>&1 | tee logs/linux-${{ matrix.os-name }}-test.log

      - name: Upload test results artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.os-name }}-test-results
          path: test/**/results/
          if-no-files-found: warn

      - name: Upload build and test logs
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.os-name }}-logs
          path: logs/
          if-no-files-found: warn

  build-and-test-windows:
    runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install OpenCppCoverage
        run: |
          choco install opencppcoverage -y

          # PATH に追加 (GitHub Actions の永続化メカニズムを使用)
          $opencppPath = "C:\Program Files\OpenCppCoverage"
          if (Test-Path $opencppPath) {
              Write-Host "`nAdding OpenCppCoverage to PATH..."
              Add-Content -Path $env:GITHUB_PATH -Value $opencppPath
              Write-Host "PATH addition completed."
          } else {
              Write-Host "ERROR: OpenCppCoverage installation directory not found at $opencppPath"
              exit 1
          }
        shell: pwsh

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool
        shell: pwsh

      - name: Setup MSVC environment
        run: |
          & "${{ github.workspace }}\.github\scripts\Add-VSBT-Env-x64.ps1"
        shell: pwsh

      - name: Record make version
        run: make --version
        shell: pwsh

      - name: Make build log directory
        run: New-Item -ItemType Directory -Force -Path logs
        shell: pwsh

      - name: Build
        run: make 2>&1 | Tee-Object -FilePath logs/windows-build.log
        shell: pwsh

      - name: Set PATH for tests
        run: |
          $paths = @(
            "${{ github.workspace }}\prod\calc\lib",
            "${{ github.workspace }}\prod\calc\bin",
            "${{ github.workspace }}\prod\calc.net\lib",
            "${{ github.workspace }}\prod\calc.net\bin",
            "${{ github.workspace }}\prod\override-sample\lib",
            "${{ github.workspace }}\prod\override-sample\bin",
            "${{ github.workspace }}\prod\porter\lib",
            "${{ github.workspace }}\prod\porter\bin",
            "${{ github.workspace }}\prod\util\lib"
          )
          foreach ($p in $paths) {
            Add-Content -Path $env:GITHUB_PATH -Value $p
            Write-Host "Added $p to PATH"
          }
        shell: pwsh

      - name: Run tests
        run: make test 2>&1 | Tee-Object -FilePath logs/windows-test.log
        shell: pwsh

      - name: Upload test results artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-test-results
          path: test/**/results/
          if-no-files-found: warn

      - name: Upload build and test logs
        uses: actions/upload-artifact@v7
        with:
          name: windows-logs
          path: logs/
          if-no-files-found: warn

  publish-docs:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/hondarer/oracle-linux-container/oracle-linux-8-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        HOST_USER: user
        HOST_UID: 1001
        HOST_GID: 127
        TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 全履歴を取得 (git log 用: Markdown 処理時に author と date を取得するため)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Initialize submodules (shallow)
        run: git submodule update --init --recursive --depth 1

      - name: Generate and publish documentation
        run: make doxy && make docs

      - name: Create artifact archives
        run: |
          mkdir -p docs/artifacts
          # HTML ドキュメント (サブディレクトリごとに分割)
          if [ -d "docs/doxygen" ]; then
            zip -r docs/artifacts/docs-html-doxygen.zip docs/doxygen || true
          fi
          find docs -type d -name html | while read -r html_dir; do
            label=$(echo "$html_dir" | sed 's|^docs/||;s|/html$||;s|/|-|g')
            zip -r "docs/artifacts/docs-html-${label}.zip" "$html_dir" || true
          done
          # DOCX ドキュメント (サブディレクトリごとに分割)
          find docs -type d -name docx | while read -r docx_dir; do
            label=$(echo "$docx_dir" | sed 's|^docs/||;s|/docx$||;s|/|-|g')
            zip -r "docs/artifacts/docs-docx-${label}.zip" "$docx_dir" || true
          done

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: docs/
          if-no-files-found: warn

      - name: Upload html artifacts (doxygen)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-html-doxygen-${{ github.sha }}
          path: docs/doxygen/
          if-no-files-found: warn

      - name: Upload html artifacts (ja)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-html-ja-${{ github.sha }}
          path: docs/ja/html/
          if-no-files-found: warn

      - name: Upload html artifacts (en)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-html-en-${{ github.sha }}
          path: docs/en/html/
          if-no-files-found: warn

      - name: Upload html artifacts (ja-details)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-html-ja-details-${{ github.sha }}
          path: docs/ja-details/html/
          if-no-files-found: warn

      - name: Upload html artifacts (en-details)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-html-en-details-${{ github.sha }}
          path: docs/en-details/html/
          if-no-files-found: warn

      - name: Upload docx artifacts (ja)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-docx-ja-${{ github.sha }}
          path: docs/ja/docx/
          if-no-files-found: warn

      - name: Upload docx artifacts (en)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-docx-en-${{ github.sha }}
          path: docs/en/docx/
          if-no-files-found: warn

      - name: Upload docx artifacts (ja-details)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-docx-ja-details-${{ github.sha }}
          path: docs/ja-details/docx/
          if-no-files-found: warn

      - name: Upload docx artifacts (en-details)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-docs-docx-en-details-${{ github.sha }}
          path: docs/en-details/docx/
          if-no-files-found: warn

  deploy-pages:
    needs: [build-and-test-linux, build-and-test-windows, publish-docs]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Linux OL8 test results
        uses: actions/download-artifact@v8
        with:
          name: linux-ol8-test-results
          path: test-results/linux-ol8

      - name: Download Linux OL10 test results
        uses: actions/download-artifact@v8
        with:
          name: linux-ol10-test-results
          path: test-results/linux-ol10

      - name: Download Windows test results
        uses: actions/download-artifact@v8
        with:
          name: windows-test-results
          path: test-results/windows

      - name: Download documentation
        uses: actions/download-artifact@v8
        with:
          name: documentation
          path: docs

      - name: Download Linux OL8 logs
        uses: actions/download-artifact@v8
        with:
          name: linux-ol8-logs
          path: logs/linux-ol8

      - name: Download Linux OL10 logs
        uses: actions/download-artifact@v8
        with:
          name: linux-ol10-logs
          path: logs/linux-ol10

      - name: Download Windows logs
        uses: actions/download-artifact@v8
        with:
          name: windows-logs
          path: logs/windows

      - name: Organize artifacts for Pages
        run: |
          # テスト結果とログをアーカイブ化
          mkdir -p docs/artifacts

          if [ -d "test-results/linux-ol8" ]; then
            zip -r docs/artifacts/linux-ol8-test-results.zip test-results/linux-ol8
            echo "Created linux-ol8-test-results.zip"
          fi

          if [ -d "test-results/linux-ol10" ]; then
            zip -r docs/artifacts/linux-ol10-test-results.zip test-results/linux-ol10
            echo "Created linux-ol10-test-results.zip"
          fi

          if [ -d "test-results/windows" ]; then
            zip -r docs/artifacts/windows-test-results.zip test-results/windows
            echo "Created windows-test-results.zip"
          fi

          if [ -d "logs/linux-ol8" ]; then
            zip -r docs/artifacts/linux-ol8-logs.zip logs/linux-ol8
            echo "Created linux-ol8-logs.zip"
          fi

          if [ -d "logs/linux-ol10" ]; then
            zip -r docs/artifacts/linux-ol10-logs.zip logs/linux-ol10
            echo "Created linux-ol10-logs.zip"
          fi

          if [ -d "logs/windows" ]; then
            zip -r docs/artifacts/windows-logs.zip logs/windows
            echo "Created windows-logs.zip"
          fi

          # ディレクトリ構造を確認
          echo "=== Pages directory structure ==="
          find docs -type f | head -20
          echo "..."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
