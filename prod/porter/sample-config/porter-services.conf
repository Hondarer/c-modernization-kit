# porter-services.conf
# 通信フレームワーク サービス定義ファイル
#
# [global] セクション: 全サービス共通のプロトコルパラメータ
# [service.<id>] セクション: サービス定義
#   <id> はサービスの識別子 (任意の int 値)。
#
# 通信種別 (type):
#   unicast   - 1:1 通信。
#               src_addr: 送信者のアドレス (IPv4 またはホスト名)、受信者の送信元フィルタ。
#               src_port: 送信者の送信元ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)。
#               dst_addr: 受信者のアドレス (IPv4 またはホスト名)。送信者の送信先、受信者の bind アドレス。
#               dst_port: 送信者の送信先ポート番号、受信者が待機するポート番号。省略不可。
#   multicast - 1:N マルチキャスト通信。
#               src_addr: 送信者のアドレス (IPv4 またはホスト名)、受信者のマルチキャスト参加インターフェース + 送信元フィルタ。
#               src_port: 送信者の送信元ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)。
#               dst_port: 送信者の送信先ポート番号、受信者が待機するポート番号。省略不可。
#   broadcast - 1:N ブロードキャスト通信。
#               src_addr: 送信者のアドレス (IPv4 またはホスト名)、受信者の送信元フィルタ。
#               src_port: 送信者の送信元ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)。
#               dst_port: 送信者の送信先ポート番号、受信者が待機するポート番号。省略不可。

# ─────────────────────────────────────────────────────────
# グローバル設定
#
#   window_size        : スライディングウィンドウサイズ (フレーム数)
#                        送受信バッファに保持できるフレームの最大数。
#   max_payload        : 1 フレームあたりの最大ペイロードサイズ (バイト)。
#   health_interval_ms : ヘルスチェックパケットの送信間隔 (ミリ秒)。
#   health_timeout_ms  : ヘルスチェックタイムアウト (ミリ秒)。
#                        この時間内に有効なフレームが受信できなければ相手を切断と判断する。
# ─────────────────────────────────────────────────────────
[global]
window_size        = 16
max_payload        = 1400
health_interval_ms = 3000
health_timeout_ms  = 9000

# ─────────────────────────────────────────────────────────
# 共通オプション (全通信種別で指定可能)
#
#   pack_wait_ms : パッキング待ち時間 (ミリ秒)。省略または 0 = 即時送信。
#                  送信者が最初の送信要求を受け付けてから指定ミリ秒の間、
#                  後続の送信要求を待ち合わせ、複数のメッセージを 1 つの
#                  UDP パケットにまとめて送信する (パッキング)。
#                  パケットサイズに対して送信データが大きくなった場合は
#                  タイムアウト前でも即時送信し、タイマーをリセットする。
#                  送信頻度が高くパケット数を削減したい場合に有効。
# ─────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────
# 1:1 通信サービス
#
#   src_addr : 送信側ホストのアドレス
#              - 送信者: このアドレスで bind する (自ホストの NIC アドレスと一致させること)
#              - 受信者: この送信元 IP からのパケットのみ受け付ける
#   src_port : 送信者の bind ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)
#   dst_addr : 受信側ホストのアドレス
#              - 送信者: この宛先へ送信する
#              - 受信者: このアドレスで bind する (自ホストの NIC アドレスと一致させること)
#   dst_port : 送信者の送信先ポート番号、受信者が待機するポート番号 (省略不可)
# ─────────────────────────────────────────────────────────

# 同一ホスト内プロセス間通信 (ループバック)
[service.1001]
type     = unicast
src_addr = 127.0.0.1
dst_addr = 127.0.0.1
dst_port = 5001

# 異なるホスト間通信
#   送信側ホスト: 192.168.1.10
#   受信側ホスト: 192.168.1.20
[service.1002]
type     = unicast
src_addr = 192.168.1.10
dst_addr = 192.168.1.20
dst_port = 5002

# ホスト名指定の例
#   送信側ホスト: sender.example.local
#   受信側ホスト: receiver.example.local
[service.1003]
type     = unicast
src_addr = sender.example.local
dst_addr = receiver.example.local
dst_port = 5003

# 送信元固定ポート指定の例
#   送信者は src_port = 5010 で bind する
[service.1004]
type     = unicast
src_addr = 192.168.1.10
src_port = 5010
dst_addr = 192.168.1.20
dst_port = 5004

# パッキング待ち時間指定の例
#   送信頻度が高い場合に pack_wait_ms を設定してパケット数を削減する。
#   最初の送信要求から 5 ms 間、後続データを待ち合わせてから送信する。
[service.1005]
type         = unicast
src_addr     = 192.168.1.10
dst_addr     = 192.168.1.20
dst_port     = 5005
pack_wait_ms = 5

# ─────────────────────────────────────────────────────────
# 1:N マルチキャスト通信サービス
#
#   src_addr        : 送信者のアドレス。受信者のマルチキャスト参加インターフェース + 送信元フィルタ。
#   src_port        : 送信者の bind ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)。
#   dst_port        : 送信者の送信先ポート番号、受信者が待機するポート番号 (省略不可)。
#   multicast_group : マルチキャストグループアドレス。
#   ttl             : マルチキャスト TTL。
# ─────────────────────────────────────────────────────────

[service.2001]
type            = multicast
src_addr        = 127.0.0.1
dst_port        = 6001
multicast_group = 239.0.0.1
ttl             = 1

[service.2002]
type            = multicast
src_addr        = 192.168.1.10
dst_port        = 6002
multicast_group = 239.0.0.2
ttl             = 1

# ─────────────────────────────────────────────────────────
# 1:N ブロードキャスト通信サービス
#
#   src_addr       : 送信者のアドレス。受信者の送信元フィルタ。
#   src_port       : 送信者の bind ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)。
#   dst_port       : 送信者の送信先ポート番号、受信者が待機するポート番号 (省略不可)。
#   broadcast_addr : ブロードキャスト宛先アドレス。
# ─────────────────────────────────────────────────────────

[service.3001]
type           = broadcast
src_addr       = 127.0.0.1
dst_port       = 7001
broadcast_addr = 255.255.255.255

[service.3002]
type           = broadcast
src_addr       = 192.168.1.10
dst_port       = 7002
broadcast_addr = 192.168.1.255
