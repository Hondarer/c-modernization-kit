# porter-services.conf
# 簡易通信フレームワーク サービス定義ファイル
#
# [global] セクション: 全サービス共通のプロトコルパラメータ
# [service.<id>] セクション: サービス定義
#   <id> がサービスの識別子 (任意の int 値)。ポート番号とは無関係。
#
# 通信種別 (type):
#   unicast   - 1:1 通信。
#               dst_port: 受信側が待機するポート番号。サービスの識別子。
#   multicast - 1:N マルチキャスト通信。
#               src_port: 送信元ポート番号。受信側はこのポートで待機する。サービスの識別子。
#   broadcast - 1:N ブロードキャスト通信。
#               src_port: 送信元ポート番号。受信側はこのポートで待機する。サービスの識別子。

# ─────────────────────────────────────────────────────────
# グローバル設定
# ─────────────────────────────────────────────────────────
[global]
window_size           = 16
max_payload           = 1400
retransmit_timeout_ms = 1000
retransmit_count      = 3

# ─────────────────────────────────────────────────────────
# 1:1 通信サービス
# ─────────────────────────────────────────────────────────
[service.1001]
type     = unicast
dst_port = 5001

[service.1002]
type     = unicast
dst_port = 5002

# ─────────────────────────────────────────────────────────
# 1:N マルチキャスト通信サービス
# ─────────────────────────────────────────────────────────
[service.2001]
type            = multicast
src_port        = 6001
multicast_group = 239.0.0.1
ttl             = 1

[service.2002]
type            = multicast
src_port        = 6002
multicast_group = 239.0.0.2
ttl             = 1

# ─────────────────────────────────────────────────────────
# 1:N ブロードキャスト通信サービス
# ─────────────────────────────────────────────────────────
[service.3001]
type           = broadcast
src_port       = 7001
broadcast_addr = 255.255.255.255

[service.3002]
type           = broadcast
src_port       = 7002
broadcast_addr = 255.255.255.255
