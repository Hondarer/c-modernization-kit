# porter-services.conf
# 通信フレームワーク サービス定義ファイル
#
# [global] セクション: 全サービス共通のプロトコルパラメータ
# [service.<id>] セクション: サービス定義
#   <id> はサービスの識別子 (任意の int64_t 値)。
#
# 通信種別 (type):
#
#   unicast_raw      - 1:1 通信。再送制御なし (ベストエフォート)。
#                      受信ウィンドウによる順序整列とセッション管理は有効。
#                      ギャップ検出時は NACK の代わりに POTR_EVENT_DISCONNECTED を発行する。
#                      potrSend は常に同期 (ブロッキング)。
#   multicast_raw    - 1:N マルチキャスト通信。再送制御なし (ベストエフォート)。
#                      unicast_raw と同様の動作。
#   broadcast_raw    - 1:N ブロードキャスト通信。再送制御なし (ベストエフォート)。
#                      unicast_raw と同様の動作。
# 
#   unicast          - 1:1 通信。再送制御あり。
#                      src_addr1〜4: 送信者のアドレス (IPv4 またはホスト名)、受信者の送信元フィルタ。
#                      src_port    : 送信者の送信元ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)。
#                      dst_addr1〜4: 受信者のアドレス (IPv4 またはホスト名)。送信者の送信先、受信者の bind アドレス。
#                      dst_port    : 送信者の送信先ポート番号、受信者が待機するポート番号。省略不可。
#   multicast        - 1:N マルチキャスト通信。再送制御あり。
#                      src_addr1〜4: 送信者のアドレス (IPv4 またはホスト名)、受信者のマルチキャスト参加インターフェース + 送信元フィルタ。
#                      src_port    : 送信者の送信元ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)。
#                      dst_port    : 送信者の送信先ポート番号、受信者が待機するポート番号。省略不可。
#   broadcast        - 1:N ブロードキャスト通信。再送制御あり。
#                      src_addr1〜4: 送信者のアドレス (IPv4 またはホスト名)、受信者の送信元フィルタ。
#                      src_port    : 送信者の送信元ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)。
#                      dst_port    : 送信者の送信先ポート番号、受信者が待機するポート番号。省略不可。
# 
#   unicast_bidir    - 双方向 1:1 通信。両端が送信者・受信者を兼ねる全二重 UDP ユニキャスト。
#                      src_addr1〜4 / src_port: SENDER の bind アドレス / ポート。src_port は省略または 0 でエフェメラル bind。
#                      dst_addr1〜4 / dst_port: RECEIVER の bind アドレス / ポート。dst_port は省略不可。
#                      両端が同じ設定エントリを使い、一方を SENDER、他方を RECEIVER として起動する。
#
#   unicast_bidir_n1 - 双方向 N:1 通信。unicast_bidir のサーバ側を明示する。
#                      RECEIVER が dst_addr1〜4 / dst_port で待機し、複数クライアントを同時に受け入れる。
#                      クライアントは type = unicast_bidir (1:1) として接続する。
#                      max_peers で最大同時接続クライアント数を指定できる (省略時: 1024)。
#                      src_port のみ指定するとポートフィルタ付き N:1 モード。
#                      クライアントは src_port で bind した固定ポートから接続し、サーバは指定ポート以外を破棄する。
#
#   tcp              - TCP 接続を使った 1:1 通信。再送制御は TCP レイヤが担う。
#                      unicast との主な違い: UDP ではなく TCP ソケットを使用する。
#                      src_addr1   : 接続元 (クライアント側) の bind アドレス (省略可)。
#                      src_port    : 接続元の bind ポート番号 (省略または 0 = エフェメラル)。
#                      dst_addr1   : サーバ側のアドレス (省略不可)。
#                      dst_port    : サーバが待機するポート番号 (省略不可)。
# 
#   tcp_bidir        - TCP 接続を使った双方向 1:1 通信。両端が送受信を兼ねる全二重 TCP 通信。
#                      unicast_bidir の TCP 版。SENDER / RECEIVER のロール分けは同様。
#                      dst_addr1 / dst_port: RECEIVER (サーバ) の bind アドレス / ポート (省略不可)。
#

# ================================================================================================================= #
# グローバル設定
#
#   window_size        : スライディングウィンドウサイズ (パケット数)
#                        送受信バッファに保持できるパケットの最大数。
#   max_payload        : 1 パケットあたりの最大ペイロードサイズ (バイト)。
#   max_message_size   : 1 回の potrSend で送信できる最大メッセージ長 (バイト)。
#                        フラグメント化により max_payload を超えるメッセージを送受信できる。
#                        省略時: 65535
#   send_queue_depth   : 非同期送信キューの最大エントリ数。
#                        メッセージがフラグメント化される場合、1 メッセージが複数エントリを占有する。
#                        省略時: 1024
#   udp_health_interval_ms : UDP ヘルスチェックパケットの送信間隔 (ミリ秒)。
#   udp_health_timeout_ms  : UDP ヘルスチェックタイムアウト (ミリ秒)。
#   tcp_health_interval_ms : TCP ヘルスチェックパケットの送信間隔 (ミリ秒)。
#   tcp_health_timeout_ms  : TCP ヘルスチェックタイムアウト (ミリ秒)。
#                        この時間内に有効なパケットが受信できなければ相手を切断と判断する。
#   reorder_timeout_ms : 欠番検出後に NACK/DISCONNECTED を遅延する時間 (ミリ秒)。
#                        マルチパスや遅延変動が大きい環境での追い越し吸収用。
#                        省略または 0 = 即時 (デフォルト)。
#                        推奨値: LAN/マルチパス = 10〜30、遠距離 WAN = 30〜100
# ================================================================================================================= #
[global]
window_size        = 16
max_payload        = 1400
# max_message_size   = 65535
# send_queue_depth   = 1024
udp_health_interval_ms = 3000
udp_health_timeout_ms  = 10000
tcp_health_interval_ms = 10000
tcp_health_timeout_ms  = 31000
# reorder_timeout_ms = 0

# ================================================================================================================= #
# 共通オプション (全通信種別で指定可能)
#
#   pack_wait_ms : パッキング待ち時間 (ミリ秒)。省略または 0 = 即時送信。
#                  送信者が最初の送信要求を受け付けてから指定ミリ秒の間、
#                  後続の送信要求を待ち合わせ、複数のメッセージを 1 つの
#                  UDP パケットにまとめて送信する (パッキング)。
#                  パケットサイズに対して送信データが大きくなった場合は
#                  タイムアウト前でも即時送信し、タイマーをリセットする。
#                  送信頻度が高くパケット数を削減したい場合に有効。
#
#   encrypt_key  : AES-256-GCM 暗号化の事前共有鍵 (Pre-Shared Key)。
#                  以下の 2 形式を受け付ける。
#                  ① hex 鍵       : 256 ビット (32 バイト) の鍵を 64 文字の 16 進数文字列で指定する。
#                  ② パスフレーズ : 64 文字 hex 以外の任意の文字列。
#                                   SHA-256 ハッシュで 32 バイト鍵を自動導出する。
#                  送受信双方で同一の値を設定すること。
#                  設定した場合、ペイロードが AES-256-GCM で暗号化される。
#                  省略時: 暗号化なし。
# ================================================================================================================= #

# ================================================================================================================= #
# 1:1 通信サービス
#
#   src_addr1 : 送信側ホストのアドレス
#              - 送信者: このアドレスで bind する (自ホストの NIC アドレスと一致させること)
#              - 受信者: この送信元 IP からのパケットのみ受け付ける
#   src_port : 送信者の bind ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)
#   dst_addr1 : 受信側ホストのアドレス
#              - 送信者: この宛先へ送信する
#              - 受信者: このアドレスで bind する (自ホストの NIC アドレスと一致させること)
#   dst_port : 送信者の送信先ポート番号、受信者が待機するポート番号 (省略不可)
# ================================================================================================================= #

# 同一ホスト内プロセス間通信 (ループバック)
[service.1001]
type      = unicast
src_addr1 = 127.0.0.1
dst_addr1 = 127.0.0.1
dst_port  = 5001

# 異なるホスト間通信
#   送信側ホスト: 192.168.1.10
#   受信側ホスト: 192.168.1.20
[service.1002]
type      = unicast
src_addr1 = 192.168.1.10
dst_addr1 = 192.168.1.20
dst_port  = 5002

# ホスト名指定の例
#   送信側ホスト: sender.example.local
#   受信側ホスト: receiver.example.local
[service.1003]
type      = unicast
src_addr1 = sender.example.local
dst_addr1 = receiver.example.local
dst_port  = 5003

# 送信元固定ポート指定の例
#   送信者は src_port = 5010 で bind する
[service.1004]
type      = unicast
src_addr1 = 192.168.1.10
src_port  = 5010
dst_addr1 = 192.168.1.20
dst_port  = 5004

# パッキング待ち時間指定の例
#   送信頻度が高い場合に pack_wait_ms を設定してパケット数を削減する。
#   最初の送信要求から 5 ms 間、後続データを待ち合わせてから送信する。
[service.1005]
type         = unicast
src_addr1    = 192.168.1.10
dst_addr1    = 192.168.1.20
dst_port     = 5005
pack_wait_ms = 5

# AES-256-GCM 暗号化の例 (hex 鍵)
#   encrypt_key に 64 文字の16進数文字列 (256 ビット鍵) を設定する。
#   送受信双方で同一の鍵を設定すること。
#   暗号化が有効な場合、ペイロードに 16 バイトの GCM 認証タグが追加される。
[service.1006]
type        = unicast
src_addr1   = 127.0.0.1
dst_addr1   = 127.0.0.1
dst_port    = 5006
encrypt_key = 0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f0a1b2c3d4e5f6a7b8c9d0e1f2a3b

# AES-256-GCM 暗号化の例 (パスフレーズ)
#   64 文字 hex 以外の文字列を指定するとパスフレーズとして扱われ、
#   SHA-256 ハッシュにより 32 バイトの AES-256 鍵が自動導出される。
#   送受信双方で同一のパスフレーズを設定すること。
[service.1007]
type        = unicast
src_addr1   = 127.0.0.1
dst_addr1   = 127.0.0.1
dst_port    = 5007
encrypt_key = MySecretPassphrase2026!

# ================================================================================================================= #
# 双方向 1:1 通信サービス
#
#   両端が送信者・受信者を兼ねる全二重 UDP ユニキャスト通信。
#   各エンドポイントは SENDER ロールまたは RECEIVER ロールで potrOpenService を呼ぶ。
#   どちらのロールも送受信・NACK・ヘルスチェック (PING) を独立して行う。
#
#   SENDER ロール:
#     - callback が必須 (相手からのデータを受け取るため)。
#     - src_addr/src_port で自端を bind し、dst_addr/dst_port へ送信する。
#   RECEIVER ロール:
#     - dst_addr/dst_port で自端を bind し、src_addr/src_port へ送信する。
#
#   両端が同じ設定エントリを使い、一方を SENDER ロール、他方を RECEIVER ロールで起動する。
#
#   src_addr1   : SENDER の bind アドレス。N:1 モードにする場合は省略する。
#   src_port    : SENDER の bind ポート番号。省略または 0 でエフェメラル bind。
#                 エフェメラル時: RECEIVER は最初のパケット受信後に SENDER のポートへ返信する。
#                 src_addr 省略かつ src_port 指定 → ポートフィルタ付き N:1 モード。
#   dst_addr1   : RECEIVER の bind アドレス。
#   dst_port    : RECEIVER の bind ポート番号 (省略不可)。
#
#   注意:
#     - src_addr を省略すると N:1 モード (下記「N:1 双方向通信サービス」参照)。
#     - マルチパス対応 (src_addr2〜4 / dst_addr2〜4 を使用可)。
# ================================================================================================================= #

# 同一ホスト内プロセス間通信 (ループバック)
#   Side A (SENDER ロール): 127.0.0.1:5031 ← bind、送信先 127.0.0.1:5032
#   Side B (RECEIVER ロール): 127.0.0.1:5032 ← bind、送信先 127.0.0.1:5031
[service.1031]
type      = unicast_bidir
src_addr1 = 127.0.0.1
src_port  = 5031
dst_addr1 = 127.0.0.1
dst_port  = 5032

# 異なるホスト間通信
#   Side A (SENDER ロール)  : ホスト 192.168.1.10、ポート 5041、送信先 192.168.1.20:5042
#   Side B (RECEIVER ロール): ホスト 192.168.1.20、ポート 5042、送信先 192.168.1.10:5041
[service.1041]
type      = unicast_bidir
src_addr1 = 192.168.1.10
src_port  = 5041
dst_addr1 = 192.168.1.20
dst_port  = 5042

# SENDER エフェメラルポートの例 (src_port 省略)
#   Side A (SENDER ロール)  : ホスト 192.168.1.10、エフェメラルポートで bind、送信先 192.168.1.20:5052
#   Side B (RECEIVER ロール): ホスト 192.168.1.20、ポート 5052 で bind、SENDER のポートをパケット受信後に動的学習
[service.1051]
type      = unicast_bidir
src_addr1 = 192.168.1.10
dst_addr1 = 192.168.1.20
dst_port  = 5052

# 動的 1:1 RECEIVER の例 (src_addr 省略)
#   RECEIVER 側は src_addr を省略できる。最初のパケット受信時に SENDER のアドレスを動的学習する。
#   SENDER 側 (service.1061_client) の src_addr が動的に学習され、1:1 通信として維持される。
#   SENDER は src_addr を省略することで INADDR_ANY bind (OS がアダプタを自動選択) も可能。
#
#   Side A (SENDER ロール)  : src_addr 省略 → INADDR_ANY bind、送信先 192.168.1.20:5056
#   Side B (RECEIVER ロール): src_addr 省略 → dst_addr:dst_port に bind し SENDER アドレスを動的学習
[service.1055]
type      = unicast_bidir
src_port  = 5055
dst_addr1 = 192.168.1.20
dst_port  = 5056

# ================================================================================================================= #
# N:1 双方向通信サービス (unicast_bidir_n1)
#
#   type = unicast_bidir_n1 で N:1 サーバを明示する。
#   サーバ側は dst_addr:dst_port で bind し、複数クライアントを同時に受け入れる。
#   クライアントは type = unicast_bidir (1:1) として接続する。
#
#   max_peers  : 最大同時接続クライアント数 (省略時: 1024)
#
#   src_port を省略 (標準 N:1):
#     クライアントはエフェメラルポートで接続。送信元 IP・ポートを問わず受け入れる。
#
#   src_port のみ指定 (ポートフィルタ付き N:1):
#     クライアントは指定ポートで bind して接続する。サーバは指定ポート以外を破棄する。
#     複数クライアントがすべて同一の固定ポートを使う場合に使用する。
#
# 使用例:
#   サーバ起動: recv  porter-services.conf 1060  (RECEIVER ロール)
#   クライアント接続: send porter-services.conf 1061  (1:1 unicast_bidir として送信)
# ================================================================================================================= #

# N:1 サーバ (ループバック、ポート 5060 で待機)
#   送信元 IP・ポートを問わず全クライアントを受け入れる (標準 N:1)
[service.1060]
type      = unicast_bidir_n1
dst_addr1 = 127.0.0.1
dst_port  = 5060
# max_peers = 1024

# N:1 サーバ (ホスト間、ポート 5061 で待機)
#   標準 N:1 (送信元フィルタなし)
[service.1061]
type      = unicast_bidir_n1
dst_addr1 = 192.168.1.20
dst_port  = 5061
# max_peers = 1024

# N:1 サーバ (ポートフィルタ付き、ポート 5062 で待機)
#   クライアントは src_port = 6000 で bind して接続する。
#   サーバはポート 6000 以外からのパケットを破棄する。
[service.1062]
type      = unicast_bidir_n1
dst_addr1 = 192.168.1.20
dst_port  = 5062
src_port  = 6000             # src_addr 省略 + src_port 指定 → ポートフィルタ付き N:1
# max_peers = 1024

# ================================================================================================================= #
# 1:N マルチキャスト通信サービス
#
#   src_addr1       : 送信者のアドレス。受信者のマルチキャスト参加インターフェース + 送信元フィルタ。
#   src_port        : 送信者の bind ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)。
#   dst_port        : 送信者の送信先ポート番号、受信者が待機するポート番号 (省略不可)。
#   multicast_group : マルチキャストグループアドレス。
#   ttl             : マルチキャスト TTL。
# ================================================================================================================= #

[service.2001]
type            = multicast
src_addr1       = 127.0.0.1
dst_port        = 6001
multicast_group = 239.0.0.1
ttl             = 1

[service.2002]
type            = multicast
src_addr1       = 192.168.1.10
dst_port        = 6002
multicast_group = 239.0.0.2
ttl             = 1

# ================================================================================================================= #
# 1:N ブロードキャスト通信サービス
#
#   src_addr1      : 送信者のアドレス。受信者の送信元フィルタ。
#   src_port       : 送信者の bind ポート番号 (省略または 0 = OS がエフェメラルポートを自動選定)。
#   dst_port       : 送信者の送信先ポート番号、受信者が待機するポート番号 (省略不可)。
#   broadcast_addr : ブロードキャスト宛先アドレス。省略時は 255.255.255.255 (限定ブロードキャスト)。
# ================================================================================================================= #

[service.3001]
type           = broadcast
src_addr1      = 127.0.0.1
dst_port       = 7001
broadcast_addr = 255.255.255.255

[service.3002]
type           = broadcast
src_addr1      = 192.168.1.10
dst_port       = 7002
broadcast_addr = 192.168.1.255

# ================================================================================================================= #
# マルチパス (複数ルート伝送) サービス
#
#   src_addr1〜4 : 送信元アドレス (各パスのインターフェース)
#                  - 送信者: このアドレスで bind する
#                  - 受信者: この送信元 IP からのパケットのみ受け付ける
#   dst_addr1〜4 : 宛先アドレス (unicast のみ)
#                  - 送信者: この宛先へ送信する
#                  - 受信者: このアドレスで bind する
#
#   パス数は src_addr1〜4 と dst_addr1〜4 の両方が設定されているエントリ数。
#   空のエントリで打ち切り (1 から連続して設定すること)。
# ================================================================================================================= #

# マルチパス unicast: 2 パス (NIC-A と NIC-B)
#   パス 1: 192.168.1.10 → 192.168.1.20
#   パス 2: 10.0.0.10   → 10.0.0.20
[service.1010]
type      = unicast
src_addr1 = 192.168.1.10
dst_addr1 = 192.168.1.20
src_addr2 = 10.0.0.10
dst_addr2 = 10.0.0.20
dst_port  = 5010

# マルチパス multicast: 2 インターフェースから送信・受信
[service.2010]
type            = multicast
src_addr1       = 192.168.1.10
src_addr2       = 10.0.0.10
dst_port        = 6010
multicast_group = 239.0.0.10
ttl             = 1

# マルチパス broadcast: 2 インターフェースから送信・受信
[service.3010]
type           = broadcast
src_addr1      = 192.168.1.10
src_addr2      = 10.0.0.10
dst_port       = 7010
broadcast_addr = 255.255.255.255

# ================================================================================================================= #
# RAW モード (ベストエフォート) サービス
#
#   再送制御なし。受信ウィンドウによる順序整列とセッション管理は有効。
#   到達保証不要・低遅延優先 のユースケース・パケット抜けをアプリケーション側で把握したいユースケースに適する。
#
#   制約:
#     - potrSend は常に同期 (ブロッキング) 送信となる。flags の POTR_SEND_BLOCKING 相当。
#     - ギャップ検出時は NACK の代わりに POTR_EVENT_DISCONNECTED を発行する。
#       次の正規パケット着信時に POTR_EVENT_CONNECTED が発行される。
#     - マルチパス対応 (src_addr2〜4 を使用可)。
#     - PING ヘルスチェックは health_interval_ms / health_timeout_ms の設定に従う。
# ================================================================================================================= #

# unicast_raw: ループバック 1:1 ベストエフォート通信
[service.1021]
type      = unicast_raw
src_addr1 = 127.0.0.1
dst_addr1 = 127.0.0.1
dst_port  = 5021

# multicast_raw: 1:N マルチキャスト ベストエフォート通信
[service.2021]
type            = multicast_raw
src_addr1       = 127.0.0.1
dst_port        = 6021
multicast_group = 239.0.0.21
ttl             = 1

# broadcast_raw: 1:N ブロードキャスト ベストエフォート通信
[service.3021]
type           = broadcast_raw
src_addr1      = 192.168.1.10
dst_port       = 7021
broadcast_addr = 255.255.255.255
